<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras</title>
</head>
<body>
    <!-- Header -->
    <header>
        <div>
            <h1 class="logo">Small Shop</h1>
            
            <nav>
                <a href="index.html">Inicio</a>
                <a href="cart.html">Carrito
                    <span id="cart-count" class="cart-count">0</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Contenido principal del carrito -->
    <main>
        <h2>Carrito de compra</h2>

        <div id="cargador-carrito" class="cargador-carrito">
            Cargando carrito...
        </div>
        
        <div id="carrito-vacio" class="carrito-vacio">
            El carrito está vacío.
        </div>
        <section id="contenedor-carrito" class="contenedor-carrito">
            <!-- Aquí se renderizarán los productos del carrito -->
        </section>
        <div id="resumen-carrito" class="resumen-carrito">
            <p>Total: <span id="total-carrito">0€</span></p>
            <button id="btn-caja" class="btn-finalizar">Finalizar la compra</button>
        </div>

    </main>
    <script src="./js/cartMain.js"></script>
</body>
</html>
